name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FLATPAK_APP_ID: io.github.sachk.SmartSwitchExplorer
  UPX_VERSION: "5.1.0"

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve project version
        id: version
        shell: bash
        run: |
          VERSION="$(python scripts/release/version.py)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pyproject
        if: startsWith(github.ref, 'refs/tags/')
        run: python scripts/release/version.py --check-tag "${GITHUB_REF}"

  windows-exe:
    name: Windows EXE (${{ matrix.arch }})
    needs: validate-version
    runs-on: ${{ matrix.runner }}
    env:
      PYINSTALLER_FORCE_UPX: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install UPX
        shell: pwsh
        run: |
          $upxVersion = "${{ env.UPX_VERSION }}"
          $extractRoot = "$env:RUNNER_TEMP\upx"
          $upxExe = $null
          foreach ($asset in @("win64", "win32")) {
            $archive = "$env:RUNNER_TEMP\upx-$asset.zip"
            $assetRoot = Join-Path $extractRoot $asset
            Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v$upxVersion/upx-$upxVersion-$asset.zip" -OutFile $archive
            Expand-Archive -Path $archive -DestinationPath $assetRoot -Force
            $candidate = Get-ChildItem -Path $assetRoot -Recurse -Filter upx.exe | Select-Object -First 1
            if (-not $candidate) { continue }
            & $candidate.FullName --version
            if ($LASTEXITCODE -eq 0) {
              $upxExe = $candidate
              break
            }
          }
          if (-not $upxExe) { throw "No runnable UPX binary found after extraction." }
          "UPX_DIR=$($upxExe.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync dependencies
        run: uv sync

      - name: Build portable EXE
        run: uv run --with pyinstaller python scripts/release/build_pyinstaller.py --profile windows-exe

      - name: Collect artifact
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          mkdir -p artifacts
          cp "dist/smartswitch-explorer.exe" "artifacts/smartswitch-explorer-${VERSION}-windows-${{ matrix.arch }}.exe"
          cp "dist/smartswitch-explorer.exe" "artifacts/smartswitch-explorer-windows-${{ matrix.arch }}.exe"

      - name: Smoke test packaged EXE
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          ./"artifacts/smartswitch-explorer-${VERSION}-windows-${{ matrix.arch }}.exe" --version

      - name: Generate checksums
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          python scripts/release/write_sha256.py \
            "artifacts/smartswitch-explorer-${VERSION}-windows-${{ matrix.arch }}.exe" \
            "artifacts/smartswitch-explorer-windows-${{ matrix.arch }}.exe"

      - name: Report artifact sizes
        shell: bash
        run: python scripts/release/size_report.py artifacts/*

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: artifacts/*

  macos-dmg:
    name: macOS DMG (universal2)
    needs: validate-version
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Build macOS universal app bundle
        run: uv run --with pyinstaller python scripts/release/build_pyinstaller.py --profile macos-universal

      - name: Smoke test app bundle
        shell: bash
        run: |
          "./dist/SmartSwitch Explorer.app/Contents/MacOS/SmartSwitch Explorer" --version

      - name: Package DMG
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          scripts/release/build_macos_installers.sh "$VERSION" "universal2" artifacts
          cp \
            "artifacts/smartswitch-explorer-${VERSION}-macos-universal2.dmg" \
            "artifacts/smartswitch-explorer-macos-universal2.dmg"

      - name: Generate checksums
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          python scripts/release/write_sha256.py \
            "artifacts/smartswitch-explorer-${VERSION}-macos-universal2.dmg" \
            "artifacts/smartswitch-explorer-macos-universal2.dmg"

      - name: Report artifact sizes
        shell: bash
        run: python scripts/release/size_report.py artifacts/*

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal2-dmg
          path: artifacts/*

  linux-appimage:
    name: Linux AppImage (${{ matrix.arch }})
    needs: validate-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libx11-6 \
            libxcb1 \
            libxext6 \
            libxrender1 \
            libxi6 \
            libxrandr2 \
            libxcursor1 \
            libsm6 \
            libice6 \
            libfontconfig1

      - name: Sync dependencies
        run: uv sync

      - name: Build Linux directory bundle
        run: uv run --with pyinstaller python scripts/release/build_pyinstaller.py --profile linux-dir

      - name: Smoke test Linux binary
        shell: bash
        run: QT_QPA_PLATFORM=offscreen ./dist/smartswitch-explorer/smartswitch-explorer --smoke-test

      - name: Build AppImage
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          scripts/release/build_appimage.sh "$VERSION" "${{ matrix.arch }}" artifacts
          cp \
            "artifacts/smartswitch-explorer-${VERSION}-linux-${{ matrix.arch }}.AppImage" \
            "artifacts/smartswitch-explorer-linux-${{ matrix.arch }}.AppImage"

      - name: Generate checksums
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          python scripts/release/write_sha256.py \
            "artifacts/smartswitch-explorer-${VERSION}-linux-${{ matrix.arch }}.AppImage" \
            "artifacts/smartswitch-explorer-linux-${{ matrix.arch }}.AppImage"

      - name: Report artifact sizes
        shell: bash
        run: python scripts/release/size_report.py artifacts/*

      - name: Upload AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: artifacts/*

  linux-flatpak:
    name: Linux Flatpak (${{ matrix.arch }})
    needs: validate-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            flatpak_arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            flatpak_arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libx11-6 \
            libxcb1 \
            libxext6 \
            libxrender1 \
            libxi6 \
            libxrandr2 \
            libxcursor1 \
            libsm6 \
            libice6 \
            libfontconfig1

      - name: Sync dependencies
        run: uv sync

      - name: Build Linux directory bundle
        run: uv run --with pyinstaller python scripts/release/build_pyinstaller.py --profile linux-dir

      - name: Install Flatpak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Install Flatpak runtimes
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.kde.Platform//6.8 org.kde.Sdk//6.8

      - name: Build Flatpak repo
        shell: bash
        run: |
          flatpak-builder \
            --user \
            --arch="${{ matrix.flatpak_arch }}" \
            --force-clean \
            --repo=repo \
            build-flatpak \
            packaging/linux/flatpak/io.github.sachk.SmartSwitchExplorer.yaml

      - name: Bundle Flatpak artifact
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          mkdir -p artifacts
          flatpak build-bundle repo "artifacts/smartswitch-explorer-${VERSION}-linux-${{ matrix.arch }}.flatpak" "$FLATPAK_APP_ID"

      - name: Generate checksums
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          python scripts/release/write_sha256.py "artifacts/smartswitch-explorer-${VERSION}-linux-${{ matrix.arch }}.flatpak"

      - name: Report artifact sizes
        shell: bash
        run: python scripts/release/size_report.py artifacts/*

      - name: Upload Flatpak artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-${{ matrix.arch }}
          path: artifacts/*

  publish-release:
    name: Publish GitHub Release
    needs:
      - validate-version
      - windows-exe
      - macos-dmg
      - linux-appimage
      - linux-flatpak
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
